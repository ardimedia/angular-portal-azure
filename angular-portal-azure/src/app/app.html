<apa-portal-layout>
  @if (!activeApp()) {
    <!-- Panorama (startboard with tiles) -->
    <apa-panorama [autoNavigate]="false" (tileClick)="onAppClick($event)" />
  } @else {
    <!-- Sidebar + Blade Host (app mode) -->
    <apa-sidebar [items]="sidebarItems()" [width]="220" />
    <apa-blade-host />
  }

  <!-- Notification Panel -->
  <apa-notification-panel>
    <div style="padding:15px; color:var(--apa-chrome-text);">
      @switch (portal.notification().path) {
        @case ('customers') {
          <h3>{{ t().customerNotif }}</h3>
          <p>{{ t().newInquiries }}</p>
          <p>{{ t().openTasks }}</p>
        }
        @default {
          <h3>{{ t().notifications }}</h3>
          <p>{{ t().noNotifications }}</p>
        }
      }
    </div>
  </apa-notification-panel>
</apa-portal-layout>
